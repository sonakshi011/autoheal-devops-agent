# AI Failure Analyzer Orchestration
# This workflow listens for the completion of the 'CI Pipeline' and triggers a diagnosis if it fails.

name: AI Failure Analyzer Orchestration

on:
  workflow_run:
    workflows: ["CI Pipeline"]
    types:
      - completed

permissions:
  actions: read   # Required to download failing run logs
  contents: read  # Required to checkout the repo and read scripts

jobs:
  capture-and-diagnose:
    # Trigger only if 'CI Pipeline' failed.
    # Safety: Explicit name check prevents recursive loops if other workflows are added.
    if: >
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.name == 'CI Pipeline'
    
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Log workflow context
        run: |
          echo "::notice::Triggered by: ${{ github.event.workflow_run.name }}"
          echo "::notice::Failed run ID: ${{ github.event.workflow_run.id }}"
          echo "::notice::Branch: ${{ github.event.workflow_run.head_branch }}"
          echo "::notice::Commit: ${{ github.event.workflow_run.head_sha }}"
          
      - name: Install project dependencies
        run: |
          python -m pip install --upgrade pip
          # We install full requirements to ensure analyze_failure.py has all imports (genai, pydantic, etc.)
          pip install -r requirements.txt
          
      - name: Download failing workflow logs
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const run_id = context.payload.workflow_run.id;
            const log_data = await github.rest.actions.downloadWorkflowRunLogs({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: run_id,
            });
            fs.writeFileSync('workflow_logs.zip', Buffer.from(log_data.data));
            
      - name: Extract Logs
        run: |
          unzip workflow_logs.zip -d extracted_logs
          # Concatenate all logs into a single text file
          cat extracted_logs/**/*.txt > raw_failure_logs.txt || true

      - name: Validate extracted logs
        run: |
          if [ ! -s raw_failure_logs.txt ]; then
            echo "::error::Extracted logs are empty. Cannot proceed with analysis."
            exit 1
          fi
          echo "Log file size: $(wc -c < raw_failure_logs.txt) bytes"
          
      - name: Execute log capture and sanitization
        env:
          GITHUB_REF_NAME: ${{ github.event.workflow_run.head_branch }}
          GITHUB_SHA: ${{ github.event.workflow_run.head_sha }}
          RUNNER_OS: ${{ runner.os }}
        run: |
          python scripts/capture_logs.py \
            --file raw_failure_logs.txt \
            --workflow "${{ github.event.workflow_run.name }}" \
            --output failure_payload.json

      - name: Execute analysis orchestrator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          python scripts/analyze_failure.py failure_payload.json

      - name: Upload diagnosis artifacts
        uses: actions/upload-artifact@v4
        if: always() # Always upload even if analysis failed (to see the payload)
        with:
          name: ai-failure-diagnosis
          path: |
            failure_payload.json
            ai_diagnosis.json
            ai_diagnosis_report.md
          retention-days: 7
