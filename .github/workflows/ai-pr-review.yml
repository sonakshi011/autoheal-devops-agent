name: AI PR Review System

on:
  pull_request:
    types: [opened, synchronize]
    # Only review files that are likely to contain code
    paths:
      - '**.py'
      - '**.js'
      - '**.ts'
      - '**.go'
      - '**.java'
      - '**.sh'
      - '**.sql'

permissions:
  contents: read
  pull-requests: write

jobs:
  ai-review:
    name: AI Code & Security Review
    runs-on: ubuntu-latest
    # Skip if the PR is from a bot to avoid recursive loops/noise
    if: github.actor != 'github-actions[bot]'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for diffs

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execute AI PR Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python scripts/review_pr.py

      - name: Upload Review Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-pr-review-logs
          path: |
            ai_review_response.json
          retention-days: 7
